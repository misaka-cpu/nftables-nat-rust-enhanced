name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  PROJECT_NAME: nftables-nat-rust-enhanced

jobs:
  build-linux-amd64:
    name: build linux-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release --locked

      - name: Package release asset
        run: |
          set -euo pipefail
          asset="${PROJECT_NAME}-linux-amd64"
          staging="dist/${asset}"
          mkdir -p "$staging"
          install -m 755 target/release/nat "$staging/nat"
          install -m 755 target/release/nat-console "$staging/nat-console"
          cp -a static "$staging/static"
          install -m 755 install.sh "$staging/install.sh"
          install -m 755 setup.sh "$staging/setup.sh"
          install -m 755 setup-console.sh "$staging/setup-console.sh"
          install -m 755 setup-console-assets.sh "$staging/setup-console-assets.sh"
          install -m 644 README.md "$staging/README.md"
          install -m 644 LICENSE "$staging/LICENSE"
          install -m 644 NOTICE "$staging/NOTICE"
          tar -C dist -czf "dist/${asset}.tar.gz" "$asset"
          (cd dist && sha256sum "${asset}.tar.gz" > SHA256SUMS)

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ env.PROJECT_NAME }}-linux-amd64.tar.gz
            dist/SHA256SUMS
