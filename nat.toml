[[rules]]
type = "single"
sport = 10000
dport = 443
domain = "toutiao.com"
protocol = "all"
ip_version = "all"

[[rules]]
type = "single"
sport = 10001
dport = 443
domain = "baidu.com"
protocol = "all"
ip_version = "all"
comment = "some comment"

[[rules]]
type = "single"
sport = 10002
dport = 443
domain = "localhost"
protocol = "all"
ip_version = "all"
comment = "redirect to localhost"

[[rules]]
type = "range"
port_start = 1000
port_end = 2000
domain = "baidu.com"
protocol = "tcp"
ip_version = "all"
comment = "all IPv4 and IPv6 support"

[[rules]]
type = "single"
sport = 9001
dport = 9099
domain = "ipv6.example.com"
protocol = "tcp"
ip_version = "ipv6"
comment = "force to nat to IPv6"

[[rules]]
type = "redirect"
sport = 10003
dport = 45678
protocol = "all"
ip_version = "all"

[dynamic_whitelist]
enabled = false
refresh_interval_seconds = 300
use_last_good_on_dns_failure = true
resolve_ipv4 = true
resolve_ipv6 = false
notify_on_change = true
# IPv4 CIDR 扩展模式：32 = 精确 IP（默认，推荐），24 = 把单个 IP 扩展为 /24 网段。
# 仅在确认运营商出口经常在同一 /24 内变化时再切换到 24。
cidr_expand_ipv4 = 32
