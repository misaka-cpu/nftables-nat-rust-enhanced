<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - nftables-nat-rust-enhanced 控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 登录</h1>
        <p class="subtitle">nftables-nat-rust-enhanced 控制台</p>

        <div id="alert" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="apiBaseUrl">🌐 后端地址</label>
                <input type="text" id="apiBaseUrl" placeholder="留空使用当前服务器，或输入如: https://example.com:5533">
            </div>

            <div class="form-group">
                <label for="username">👤 用户名</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">🔒 密码</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn" id="submitBtn">登录</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const alertDiv = document.getElementById('alert');

        // 检测是否在 iframe 中运行
        const isInIframe = window.self !== window.top;

        function showAlert(message, isError = false) {
            alertDiv.textContent = message;
            alertDiv.className = `alert ${isError ? 'alert-error' : 'alert-success'}`;
            alertDiv.style.display = 'block';
        }

        function hideAlert() {
            alertDiv.style.display = 'none';
        }

        // Storage Access API 支持
        async function checkStorageAccess() {
            if (!document.hasStorageAccess) {
                console.log('Storage Access API 不可用');
                return true; // API 不可用时假设有权限
            }
            try {
                return await document.hasStorageAccess();
            } catch (e) {
                console.warn('检查 Storage Access 失败:', e);
                return false;
            }
        }

        async function requestStorageAccess() {
            if (!document.requestStorageAccess) {
                console.log('requestStorageAccess API 不可用');
                return true; // API 不可用时假设成功
            }
            try {
                await document.requestStorageAccess();
                console.log('Storage Access 请求成功');
                return true;
            } catch (e) {
                console.warn('Storage Access 请求失败:', e);
                return false;
            }
        }

        // 确保在 iframe 中有 storage access 权限
        async function ensureStorageAccess() {
            if (!isInIframe) {
                return true; // 不在 iframe 中，无需请求
            }

            const hasAccess = await checkStorageAccess();
            if (hasAccess) {
                console.log('已有 Storage Access 权限');
                return true;
            }

            console.log('正在请求 Storage Access 权限...');
            return await requestStorageAccess();
        }

        // 页面加载时读取保存的后端地址并检查 storage access
        window.addEventListener('DOMContentLoaded', async () => {
            // 先尝试获取 storage access
            if (isInIframe) {
                const hasAccess = await checkStorageAccess();
                if (!hasAccess) {
                    showAlert('在 iframe 中运行，点击页面任意位置以启用 Cookie 访问', false);
                    // 添加一次性点击事件来请求 storage access（需要用户交互）
                    document.body.addEventListener('click', async function handleClick() {
                        document.body.removeEventListener('click', handleClick);
                        const granted = await requestStorageAccess();
                        if (granted) {
                            hideAlert();
                            loadSavedSettings();
                        } else {
                            showAlert('无法获取 Cookie 访问权限，部分功能可能受限', true);
                        }
                    }, { once: true });
                } else {
                    loadSavedSettings();
                }
            } else {
                loadSavedSettings();
            }
        });

        function loadSavedSettings() {
            try {
                const savedApiBaseUrl = localStorage.getItem('apiBaseUrl') || '';
                document.getElementById('apiBaseUrl').value = savedApiBaseUrl;
            } catch (e) {
                console.warn('无法访问 localStorage:', e);
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            // 确保有 storage access 权限
            const hasAccess = await ensureStorageAccess();
            if (!hasAccess && isInIframe) {
                showAlert('需要 Cookie 访问权限才能登录，请点击页面后重试', true);
                return;
            }

            // 保存后端地址到 localStorage
            const apiBaseUrl = document.getElementById('apiBaseUrl').value.trim();
            try {
                localStorage.setItem('apiBaseUrl', apiBaseUrl);
            } catch (e) {
                console.warn('无法保存到 localStorage:', e);
            }

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';

            try {
                const response = await fetch(`${apiBaseUrl}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include' // 支持跨域 cookie
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // 保存 JWT token 到 localStorage
                    if (data.token) {
                        try {
                            localStorage.setItem('jwtToken', data.token);
                        } catch (e) {
                            console.warn('无法保存 token 到 localStorage:', e);
                        }
                    }
                    showAlert('登录成功！正在跳转...', false);
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showAlert(data.message || '登录失败，请重试', true);
                    submitBtn.disabled = false;
                    submitBtn.textContent = '登录';
                }
            } catch (error) {
                showAlert('网络错误: ' + error.message, true);
                submitBtn.disabled = false;
                submitBtn.textContent = '登录';
            }
        });

        // 检查是否已登录
        window.addEventListener('load', async () => {
            // 确保有 storage access
            await ensureStorageAccess();

            try {
                let apiBaseUrl = '';
                let token = null;

                try {
                    apiBaseUrl = localStorage.getItem('apiBaseUrl') || '';
                    token = localStorage.getItem('jwtToken');
                } catch (e) {
                    console.warn('无法访问 localStorage:', e);
                }

                const headers = {
                    'Content-Type': 'application/json',
                };

                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }

                const response = await fetch(`${apiBaseUrl}/api/me`, {
                    method: 'GET',
                    headers: headers,
                    credentials: 'include' // 支持跨域 cookie
                });

                if (response.ok) {
                    showAlert('您已登录，正在跳转...', false);
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                }
            } catch (e) {
                // 未登录，继续显示登录页面
            }
        });
    </script>
</body>
</html>
